name: Docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check whitespace
        run: git diff --check

      - name: Install ripgrep
        run: sudo apt-get update -y && sudo apt-get install -y ripgrep

      - name: Check sensitive patterns
        run: |
          ! rg -n "BEGIN (RSA|OPENSSH|PRIVATE) KEY|AKIA[0-9A-Z]{16}|api[_-]?key\\s*[:=]|password\\s*[:=]|secret\\s*[:=]|(^|[^[:alnum:]_-])token\\s*[:=]" .

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --accept 200,206,429 './**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
