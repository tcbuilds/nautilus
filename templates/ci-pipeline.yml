# Solo-shaped GitHub Actions pipeline.
# Drop into .github/workflows/ci.yml in any project. Customize the language-specific steps.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          # language-specific: ruff check, eslint, golangci-lint, clippy, etc.
          echo "lint here"

      - name: Type check
        run: |
          # language-specific: mypy --strict, tsc --noEmit, etc.
          echo "type check here"

      - name: Test
        run: |
          # language-specific: pytest, vitest, go test ./..., cargo test, etc.
          echo "test here"

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: SCA (Trivy filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1

  build-and-attest:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build artifact
        run: |
          # language-specific build
          echo "build here"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/**'

      - name: Sign artifact (Sigstore cosign)
        uses: sigstore/cosign-installer@v3
      # cosign sign-blob with --bundle on each artifact
